# settings.yaml — Shotgun Demand Forecasting Configuration
# CIS 531/731 Term Project

project:
  name: shotgun-demand-forecasting
  version: "1.0.0"
  description: "SKU-level demand forecasting for DLX shotgun product lines"
  author: Brent Showalter

random_seed: 42

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_features: data/features
  models: models/trained
  model_configs: models/configs
  notebooks: notebooks
  deliverables: deliverables
  logs: logs

data:
  schema:
    columns:
      - subcategory
      - sizing
      - tactical
      - barrel_length
      - trigger_action
      - quantity
      - amount
    index: date
    frequency: monthly
  years:
    start: 2019
    end: 2023
  product_filter:
    min_nonzero_months: 12
    target_column: quantity
    product_key:
      - subcategory
      - sizing
      - tactical

hunting_seasons:
  waterfowl:
    start_month: 10
    end_month: 1
  upland:
    start_month: 9
    end_month: 2
  turkey_spring:
    start_month: 3
    end_month: 5
  turkey_fall:
    start_month: 10
    end_month: 11
  dove:
    start_month: 9
    end_month: 11
  deer:
    start_month: 10
    end_month: 1

features:
  lags: [1, 3, 6, 12]
  rolling_windows: [3, 6, 12]
  target: quantity
  categorical:
    - subcategory
    - sizing
    - tactical

models:
  baselines:
    seasonal_naive:
      description: "Same month last year — simplest meaningful baseline"
    ridge:
      description: "Linear model on engineered features"
      alpha: 1.0
    sarima:
      description: "Classical time-series method"
      order: [1, 1, 1]
      seasonal_order: [1, 1, 1, 12]
  alternatives:
    xgboost:
      description: "Gradient boosting with Bayesian hyperparameter optimization"
      optuna_search_space:
        n_estimators:
          type: int
          low: 100
          high: 1000
          step: 100
        max_depth:
          type: int
          low: 3
          high: 10
        learning_rate:
          type: float
          low: 0.01
          high: 0.3
          log: true
        subsample:
          type: float
          low: 0.6
          high: 1.0
        colsample_bytree:
          type: float
          low: 0.6
          high: 1.0
    lightgbm:
      description: "Second GBM variant for robustness check"
      optuna_search_space:
        n_estimators:
          type: int
          low: 100
          high: 1000
          step: 100
        max_depth:
          type: int
          low: 3
          high: 10
        learning_rate:
          type: float
          low: 0.01
          high: 0.3
          log: true
        num_leaves:
          type: int
          low: 20
          high: 150
        subsample:
          type: float
          low: 0.6
          high: 1.0

evaluation:
  cv:
    min_train_months: 24
    horizon_months: 3
    step_months: 3
  metrics:
    - rmse
    - mae
    - mape
  statistical_test:
    method: paired_ttest
    alpha: 0.05

optuna:
  n_trials: 50
  direction: minimize
  metric: mape

pipeline:
  expected_raw_rows: 15181
  product_key:
    - subcategory
    - sizing
    - tactical
  date_start: "2019-01-01"
  date_end: "2023-12-01"
  total_months: 60
